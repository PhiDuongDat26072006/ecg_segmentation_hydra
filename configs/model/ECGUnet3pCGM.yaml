_target_: src.models.ECG_segmentation_module.ECG_segmentation_LitModule
learning_rate: 0.001
focal_gamma: 1
alpha: 1
beta: 1

net:
  _target_: src.models.ECGUnet3pCGM.ECGUNet3pCGM
  down1:
    _target_: src.models.ECGUnet3pCGM.StackEncoder
    in_channels: 1
    out_channels: 32

  down2:
    _target_: src.models.ECGUnet3pCGM.StackEncoder
    in_channels: 32
    out_channels: 64

  down3:
    _target_: src.models.ECGUnet3pCGM.StackEncoder
    in_channels: 64
    out_channels: 128

  down4:
    _target_: src.models.ECGUnet3pCGM.StackEncoder
    in_channels: 128
    out_channels: 256

  middle:
    _target_: torch.nn.Sequential
    _args_:
      - _target_: src.models.ECGUnet3pCGM.ConvBnRelu1d
        in_channels: 256
        out_channels: 512
      - _target_: src.models.ECGUnet3pCGM.ConvBnRelu1d
        in_channels: 512
        out_channels: 512

  classify:
    _target_: torch.nn.Sequential
    _args_:
      - _target_: torch.nn.BatchNorm1d
        num_features: 992 # sum(filters) = 32 + 64 + 128 + 256 + 512
      - _target_: torch.nn.LeakyReLU

      - _target_: torch.nn.Conv1d
        in_channels: 992
        out_channels: 512
        kernel_size: 17
        stride: 1
        padding: 8
      - _target_: torch.nn.BatchNorm1d
        num_features: 512
      - _target_: torch.nn.LeakyReLU

      - _target_: torch.nn.Dropout1d
        p: 0.2

      - _target_: torch.nn.Conv1d
        in_channels: 512
        out_channels: 512
        kernel_size: 17
        stride: 1
        padding: 8
      - _target_: torch.nn.BatchNorm1d
        num_features: 512
      - _target_: torch.nn.LeakyReLU

      - _target_: torch.nn.AdaptiveAvgPool1d
        output_size: 1
      - _target_: torch.nn.Flatten
        start_dim: 1
      - _target_: torch.nn.Linear
        in_features: 512
        out_features: 2

  up4:
    _target_: src.models.ECGUnet3pCGM.StackDecoder3p
    in_channels: [32, 64, 128, 256, 512]
    skip_channels: 32
    out_channels: 160

  up3:
    _target_: src.models.ECGUnet3pCGM.StackDecoder3p
    in_channels: [ 32, 64, 128, 160, 512]
    skip_channels: 32
    out_channels: 160

  up2:
    _target_: src.models.ECGUnet3pCGM.StackDecoder3p
    in_channels: [ 32, 64, 160, 160, 512]
    skip_channels: 32
    out_channels: 160

  up1:
    _target_: src.models.ECGUnet3pCGM.StackDecoder3p
    in_channels: [ 32, 160, 160, 160, 512]
    skip_channels: 32
    out_channels: 160

  segment:
    _target_: torch.nn.Conv1d
    in_channels: 160
    out_channels: 4
    kernel_size: 1
    padding: 0

